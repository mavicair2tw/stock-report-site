<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTC 每日績效報表</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root { --bg:#0b1020; --panel:#121a2f; --panel2:#18213a; --text:#e6edf3; --muted:#9fb0c3; --green:#22c55e; --red:#ef4444; }
      *{box-sizing:border-box} body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;margin:20px;background:linear-gradient(180deg,#0b1020 0%,#0a1226 100%);color:var(--text)}
      .wrap{max-width:1100px;margin:0 auto}
      .top-bar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
      .logo{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:10px;border:1px solid #2a3a5e;background:#101a33;color:#dbeafe;font-weight:800;font-size:13px}
      .top-tags{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
      .nav-item{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
      .tag{display:inline-block;padding:6px 10px;border-radius:999px;border:1px solid #2a3a5e;color:#cfe2ff;text-decoration:none;font-size:12px;font-weight:700}
      .tag-sub{color:#8fa3bf;font-size:11px;line-height:1;padding-left:8px}
      .tag.active{border-color:#60a5fa;background:#1a315f;color:#fff}
      h1{margin:0 0 8px}.sub{color:var(--muted);margin-bottom:14px}
      .status{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:600;background:#253252;color:#c7d5e5;margin-bottom:16px}
      .up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--muted)} .muted{color:var(--muted)}
      .frame-switch{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px}
      .frame-switch button{padding:6px 12px;border-radius:999px;border:1px solid #2a3a5e;background:#0f1730;color:#cfe2ff;font-size:12px;font-weight:700;cursor:pointer}
      .frame-switch button.active{background:#1a315f;border-color:#60a5fa;color:#fff}
      .frame-switch button:disabled{opacity:0.4;cursor:not-allowed}
      .card{background:var(--panel);border:1px solid #1f2a44;border-radius:12px;padding:12px;margin-bottom:14px}
      .summary{margin-top:14px;background:var(--panel);border:1px solid #1f2a44;border-radius:12px;padding:14px;line-height:1.6}
      table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:12px;overflow:hidden}
      th,td{padding:12px;border-bottom:1px solid #1f2a44;text-align:left} th{background:var(--panel2)} tr:last-child td{border-bottom:none}

    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top-bar">
        <div class="logo">🧭 OpenClaw Market Hub</div>
        <div class="top-tags">
          <div class="nav-item"><a class="tag" href="https://openai-tw.com/">Home</a><span class="tag-sub">Main Portal</span></div>
          <div class="nav-item"><a class="tag" href="https://openai-tw.com/tw/">台股</a><span class="tag-sub">TW Market</span></div>
          <div class="nav-item"><a class="tag" href="https://openai-tw.com/us/">美股</a><span class="tag-sub">US Market</span></div>
          <div class="nav-item"><a class="tag active" href="/stock-report-site/btc-hourly/">BTC</a><span class="tag-sub">Daily</span></div>
        </div>
      </div>
      <h1>BTC 每日績效報表</h1>
      <div class="sub" id="updated">載入中...</div>
      <div class="sub" id="viewCounter">點閱數：--</div>
      <div class="status">綠色 = 上漲，紅色 = 下跌</div>

      <div class="frame-switch" id="frameSwitch">
        <button data-frame="hour">每小時</button>
        <button data-frame="day">每日</button>
        <button data-frame="week">每週</button>
        <button data-frame="month">每月</button>
        <button data-frame="year">每年</button>
      </div>

      <div class="card"><canvas id="trendChart" height="90"></canvas></div>

      <table>
        <thead><tr><th>區間</th><th>價格</th><th>變動</th><th>漲幅</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="summary">
        <div id="summary">載入摘要中...</div>
      </div>


    </div>

        <script>

      const pageKey = `views:${location.pathname}`;
      const pageViews = Number(localStorage.getItem(pageKey) || '0') + 1;
      localStorage.setItem(pageKey, String(pageViews));
      const viewCounterEl = document.getElementById('viewCounter');
      if (viewCounterEl) viewCounterEl.textContent = `點閱數：${pageViews}`;

      const FRAME_LABELS = { hour: '每小時', day: '每日', week: '每週', month: '每月', year: '每年' };
      let btcData = null;
      let currentFrame = null;
      let chartInstance = null;

      function cls(value){
        const num = Number(value);
        if (Number.isNaN(num)) return 'flat';
        if (num > 0) return 'up';
        if (num < 0) return 'down';
        return 'flat';
      }

      function fmt(value, suffix = ''){
        if (value === null || value === undefined || Number.isNaN(Number(value))) return 'N/A';
        const num = Number(value);
        return `${num.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2})}${suffix}`;
      }

      function fmts(value, suffix = ''){
        if (value === null || value === undefined || Number.isNaN(Number(value))) return 'N/A';
        const num = Number(value);
        const sign = num > 0 ? '+' : '';
        const formatted = Math.abs(num).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:3});
        return `${sign}${formatted}${suffix}`;
      }

      function renderSummary(rows, latest, frameKey){
        const label = FRAME_LABELS[frameKey] || '區間';
        const valid = (rows || []).filter(row => typeof row.changePercent === 'number');
        if(!valid.length){
          document.getElementById('summary').innerHTML = `【BTC 摘要】${label}資料不足，暫無分析。<br><span class="muted">※ 僅供參考，非投資建議。</span>`;
          return;
        }
        const avg = valid.reduce((sum, row) => sum + row.changePercent, 0) / valid.length;
        const up = valid.filter(row => row.changePercent > 0).length;
        const down = valid.filter(row => row.changePercent < 0).length;
        let tone = '區間震盪';
        let action = '建議小倉位、分批進出，避免追漲殺跌。';
        if(avg > 0.3 && up > down){
          tone = '偏多';
          action = '可沿趨勢分批佈局，但務必設定停損。';
        } else if(avg < -0.3 && down >= up){
          tone = '偏空';
          action = '以防守為主，等待止跌訊號再考慮加碼。';
        }
        document.getElementById('summary').innerHTML =
          `【BTC 摘要】最近 ${valid.length} 個${label}平均變動 <b>${avg.toFixed(3)}%</b>，上漲 ${up} / 下跌 ${down}。<br>`+
          `最新${label}變動：<span class="${cls(latest?.changePercent)}">${fmts(latest?.changePercent,'%')}</span>，盤勢判讀：<b>${tone}</b>。<br>`+
          `【投資建議】${action}<br><span class="muted">※ 以上為程式自動摘要，僅供參考，非投資建議。</span>`;
      }

      function renderChart(points, frameKey){
        const ctx = document.getElementById('trendChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        const labels = points.map(p => p.time);
        const values = points.map(p => p.close);
        chartInstance = new Chart(ctx, {
          type: 'line',
          data: { labels, datasets: [{ label: `BTC ${FRAME_LABELS[frameKey] || ''}`, data: values, borderColor: 'rgba(88,166,255,1)', backgroundColor: 'rgba(88,166,255,0.18)', tension: 0.25, fill: true, pointRadius: 0 }] },
          options: {
            responsive: true,
            plugins: { legend: { labels: { color: '#e6edf3' } } },
            scales: {
              x: { ticks: { color: '#c7d5e5' }, grid: { color: 'rgba(255,255,255,0.05)' } },
              y: { ticks: { color: '#c7d5e5' }, grid: { color: 'rgba(255,255,255,0.05)' } }
            }
          }
        });
      }

      function updateFrameButtons(frames){
        const container = document.getElementById('frameSwitch');
        if(!container) return;
        container.querySelectorAll('button').forEach(btn => {
          const key = btn.dataset.frame;
          if(!frames[key]){
            btn.disabled = true;
            btn.classList.remove('active');
          } else {
            btn.disabled = false;
            btn.addEventListener('click', () => renderFrame(key));
          }
        });
      }

      function renderFrame(key){
        if(!btcData?.frames?.[key]) return;
        currentFrame = key;
        const frame = btcData.frames[key];
        const latest = frame.latest || {};
        const label = FRAME_LABELS[key] || '';
        document.getElementById('updated').innerHTML =
          `最後更新：${btcData.updatedAt} (${btcData.timezone}) ｜ 現價 <b>${fmt(latest.price)}</b> ｜ `+
          `<span class="${cls(latest.change)}">${fmts(latest.change)}</span> / <span class="${cls(latest.changePercent)}">${fmts(latest.changePercent,'%')}</span>`+
          (label ? ` <span class="muted">（${label}變動）</span>` : '');

        const rows = (frame.table || []).slice().reverse().map(row =>
          `<tr><td>${row.label}</td><td>${fmt(row.price)}</td><td class="${cls(row.change)}">${fmts(row.change)}</td><td class="${cls(row.changePercent)}">${fmts(row.changePercent,'%')}</td></tr>`
        ).join('');
        document.getElementById('rows').innerHTML = rows || `<tr><td colspan="4" class="muted">暫無資料</td></tr>`;

        renderSummary(frame.table || [], latest, key);
        renderChart(frame.series || [], key);
        document.querySelectorAll('#frameSwitch button').forEach(btn => btn.classList.toggle('active', btn.dataset.frame === key));
      }

      fetch('./data/latest.json?ts='+Date.now())
        .catch(()=>fetch('../data/latest.json?ts='+Date.now()))
        .then(r=>r.json())
        .then(data=>{
          btcData = data;
          updateFrameButtons(data.frames || {});
          const initial = (data.defaultFrame && data.frames?.[data.defaultFrame]) ? data.defaultFrame : Object.keys(data.frames || {})[0];
          if(initial){
            renderFrame(initial);
          } else {
            document.getElementById('updated').textContent = '找不到任何資料框架';
          }
        })
        .catch(()=>{document.getElementById('updated').textContent='讀取資料失敗';});
    </script>
  </body>
</html>
